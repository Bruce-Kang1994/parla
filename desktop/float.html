<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .float {
      margin: 8px;
      height: 72px;
      background: rgba(255, 255, 255, 0.88);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      opacity: 0;
      transform: translateY(-12px) scale(0.96);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .float.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .dot {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .dot.listening { background: #EEF2FF; }
    .dot.processing { background: #FFF7ED; }
    .dot.done { background: #F0FDF4; }
    .dot.error { background: #FEF2F2; }
    .info { flex: 1; min-width: 0; }
    .label {
      font-size: 13px;
      font-weight: 600;
      color: #1A1A2E;
      line-height: 1.3;
    }
    .sub {
      font-size: 11px;
      color: #9CA3AF;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .waves {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 24px;
    }
    .waves span {
      display: block;
      width: 3px;
      background: #6366F1;
      border-radius: 2px;
      animation: w 0.7s ease-in-out infinite alternate;
    }
    .waves span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .waves span:nth-child(2) { height: 12px; animation-delay: 0.08s; }
    .waves span:nth-child(3) { height: 8px; animation-delay: 0.16s; }
    .waves span:nth-child(4) { height: 16px; animation-delay: 0.24s; }
    .waves span:nth-child(5) { height: 10px; animation-delay: 0.32s; }
    .waves span:nth-child(6) { height: 14px; animation-delay: 0.40s; }
    @keyframes w {
      to { transform: scaleY(0.3); }
    }
    .spin { animation: sp 0.8s linear infinite; display: inline-block; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .label.success { color: #16A34A; }
    .label.fail { color: #DC2626; }
  </style>
</head>
<body>
  <div id="f" class="float">
    <div id="d" class="dot listening">
      <span id="ic">&#127908;</span>
    </div>
    <div class="info">
      <div id="lb" class="label">正在听...</div>
      <div id="sb" class="sub"></div>
    </div>
    <div id="wv" class="waves">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
  <script>
    const f = document.getElementById('f');
    const d = document.getElementById('d');
    const ic = document.getElementById('ic');
    const lb = document.getElementById('lb');
    const sb = document.getElementById('sb');
    const wv = document.getElementById('wv');

    function beep(freq, dur, enabled) {
      if (!enabled) return;
      try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start();
        osc.stop(ctx.currentTime + dur);
        setTimeout(() => ctx.close(), dur * 1000 + 100);
      } catch {}
    }

    function startBeep(on) {
      beep(880, 0.12, on);
    }

    function stopBeep(on) {
      beep(880, 0.08, on);
      setTimeout(() => beep(1100, 0.08, on), 100);
    }

    window.murmur.onFloatUpdate((state) => {
      const snd = state.soundEnabled !== false;
      lb.className = 'label';
      switch (state.status) {
        case 'listening':
          f.classList.add('visible');
          d.className = 'dot listening';
          ic.innerHTML = '&#127908;';
          lb.textContent = '正在听...';
          const ctxLabels = { general: '通用', email: '邮件', chat: '聊天', document: '文档', code: '代码' };
          sb.textContent = ctxLabels[state.context] ? ctxLabels[state.context] + '模式' : '';
          wv.style.display = 'flex';
          startBeep(snd);
          break;
        case 'processing':
          f.classList.add('visible');
          d.className = 'dot processing';
          ic.innerHTML = '<span class="spin">&#9203;</span>';
          lb.textContent = '正在处理...';
          sb.textContent = '';
          wv.style.display = 'none';
          stopBeep(snd);
          break;
        case 'done':
          d.className = 'dot done';
          ic.innerHTML = '&#9989;';
          lb.className = 'label success';
          lb.textContent = '已插入到光标位置';
          sb.textContent = state.text ? state.text.slice(0, 60) + (state.text.length > 60 ? '...' : '') : '';
          wv.style.display = 'none';
          break;
        case 'error':
          d.className = 'dot error';
          ic.innerHTML = '&#10060;';
          lb.className = 'label fail';
          lb.textContent = state.text || '处理失败';
          sb.textContent = '';
          wv.style.display = 'none';
          break;
        case 'hide':
          f.classList.remove('visible');
          break;
      }
    });
  </script>
</body>
</html>
